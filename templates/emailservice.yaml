apiVersion: v1
kind: ServiceAccount
metadata:
  name: emailservice
  labels:
    app: emailservice
---
apiVersion: v1
kind: Service
metadata:
  name: emailservice
  labels:
    app: emailservice
spec:
  type: ClusterIP
  ports:
    - name: grpc
      port: 5000
      targetPort: 8080
  selector:
    app: emailservice
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: emailservice
  labels:
    app: emailservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: emailservice
  template:
    metadata:
      labels:
        app: emailservice
    spec:
      serviceAccountName: emailservice
      securityContext:
        runAsNonRoot: true
      terminationGracePeriodSeconds: 5
      containers:
        - name: server
          image: "{{ .Values.global.imageRegistry }}/emailservice:{{ .Values.global.imageTag }}"
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: DISABLE_PROFILER
              value: "1"
          livenessProbe:
            grpc:
              port: 8080
            periodSeconds: 5
          readinessProbe:
            grpc:
              port: 8080
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            privileged: false
            readOnlyRootFilesystem: true
